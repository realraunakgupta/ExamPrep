<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (location.protocol !== 'https:' && location.hostname.endsWith('surge.sh')) {
            location.replace(`https:${location.href.substring(location.protocol.length)}`);
        }
    </script>
    <title>Coming Soon | Subject Portal</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .coming-soon-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 2rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .icon-wrapper i {
            font-size: 2rem;
            color: #818cf8;
            animation: pulse 2s infinite ease-in-out;
        }

        .coming-soon-title {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .coming-soon-text {
            color: var(--text-muted);
            max-width: 500px;
            margin-bottom: 3rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            border-radius: 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="coming-soon-container">
        <div class="icon-wrapper">
            <i class="fa-solid fa-person-digging"></i>
        </div>
        <h1 class="coming-soon-title">Under Construction</h1>
        <p class="coming-soon-text">We are currently gathering resources and building the study material for this
            subject. Please check back later.</p>
        <a href="index.html" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> Return Home
        </a>
    </div>
</body>

</html>
